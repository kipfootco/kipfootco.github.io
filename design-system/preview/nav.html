<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-base); padding: 0; margin: 0; }

  /* Top Nav */
  .top-nav {
    height: 56px;
    background: rgba(12,12,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center;
    padding: 0 24px;
    gap: 0;
    position: relative;
  }
  .nav-logo { display: flex; align-items: center; gap: 8px; margin-right: 32px; text-decoration: none; }
  .logo-mark { width: 22px; height: 22px; }
  .logo-text { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--fg-1); letter-spacing: -0.02em; }
  .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
  .nav-link {
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    color: var(--fg-2); padding: 6px 12px; border-radius: var(--radius-md);
    text-decoration: none; transition: color 120ms, background 120ms;
  }
  .nav-link:hover { color: var(--fg-1); background: rgba(255,255,255,0.05); }
  .nav-link.active { color: var(--fg-1); }
  .nav-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .btn-sm {
    height: 30px; padding: 0 12px;
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    border-radius: var(--radius-md); border: 1px solid transparent;
    cursor: pointer; transition: all 120ms;
  }
  .btn-ghost { background: transparent; color: var(--fg-2); border-color: transparent; }
  .btn-ghost:hover { color: var(--fg-1); background: rgba(255,255,255,0.05); }
  .btn-primary { background: #ff6b35; color: #0c0c0f; border-color: #ff6b35; }
  .btn-primary:hover { background: #e85a24; }

  /* Divider between top nav demo and sidebar demo */
  .demo-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); text-transform: uppercase; padding: 16px 24px 8px; font-family: var(--font-body); }

  /* Sidebar Nav */
  .sidebar {
    width: 220px;
    background: var(--bg-surface);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 12px 10px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .sidebar-section { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); text-transform: uppercase; padding: 8px 10px 4px; font-family: var(--font-body); }
  .sidebar-item {
    display: flex; align-items: center; gap: 9px;
    font-family: var(--font-body); font-size: 13px; font-weight: 400;
    color: var(--fg-2); padding: 7px 10px; border-radius: var(--radius-md);
    cursor: pointer; transition: all 120ms;
  }
  .sidebar-item:hover { color: var(--fg-1); background: rgba(255,255,255,0.05); }
  .sidebar-item.active { color: var(--fg-1); background: rgba(255,255,255,0.08); font-weight: 500; }
  .sidebar-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .sidebar-item.active .sidebar-icon { opacity: 1; }
  .sidebar-badge { margin-left: auto; font-size: 10px; background: rgba(255,107,53,0.2); color: #ff6b35; padding: 1px 6px; border-radius: 9999px; font-weight: 600; }
</style>
</head>
<body>

<!-- Top navigation -->
<nav class="top-nav">
  <a class="nav-logo" href="#">
    <svg class="logo-mark" viewBox="0 0 32 32" fill="none"><rect x="4" y="4" width="3" height="24" rx="1.5" fill="#ff6b35"/><line x1="7" y1="16" x2="20" y2="7" stroke="#ff6b35" stroke-width="3" stroke-linecap="round"/><line x1="7" y1="16" x2="20" y2="25" stroke="#ff6b35" stroke-width="3" stroke-linecap="round"/></svg>
    <span class="logo-text">kipfoot</span>
  </a>
  <div class="nav-links">
    <a class="nav-link active" href="#">Tools</a>
    <a class="nav-link" href="#">Docs</a>
    <a class="nav-link" href="#">Projects</a>
    <a class="nav-link" href="#">Team</a>
  </div>
  <div class="nav-actions">
    <button class="btn-sm btn-ghost">Log in</button>
    <button class="btn-sm btn-primary">Get Access</button>
  </div>
</nav>

<div class="demo-label">Sidebar Navigation</div>
<div style="display:flex">
  <nav class="sidebar">
    <div class="sidebar-section">Workspace</div>
    <div class="sidebar-item active">
      <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
      All Tools
      <span class="sidebar-badge">24</span>
    </div>
    <div class="sidebar-item">
      <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 2L14 14H2L8 2Z"/></svg>
      Structural
    </div>
    <div class="sidebar-item">
      <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="10" r="4"/><path d="M8 2v4"/></svg>
      Geotechnical
    </div>
    <div class="sidebar-item">
      <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 10 Q5 4 8 8 Q11 12 14 6"/></svg>
      Hydraulic
    </div>
    <div class="sidebar-section" style="margin-top:8px">Recent</div>
    <div class="sidebar-item">
      <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
      Beam Analysis
    </div>
    <div class="sidebar-item">
      <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="10" height="10" rx="1"/><path d="M6 8h4M8 6v4"/></svg>
      Column Design
    </div>
  </nav>
</div>

</body>
</html>
