<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-base); padding: 20px 24px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--fg-3); text-transform: uppercase; margin: 16px 0 10px; font-family: var(--font-body); }
  .section-label:first-child { margin-top: 0; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  /* Base button */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-family: var(--font-body); font-weight: 500; font-size: 13px;
    border-radius: var(--radius-md); border: 1px solid transparent;
    cursor: pointer; transition: all 120ms cubic-bezier(0.16,1,0.3,1);
    white-space: nowrap; text-decoration: none; line-height: 1;
  }
  /* Sizes */
  .btn-sm  { height: 28px; padding: 0 10px; font-size: 12px; }
  .btn-md  { height: 36px; padding: 0 14px; font-size: 13px; }
  .btn-lg  { height: 44px; padding: 0 20px; font-size: 15px; }
  /* Variants */
  .btn-primary  { background: #ff6b35; color: #0c0c0f; border-color: #ff6b35; box-shadow: 0 0 16px rgba(255,107,53,0.2); }
  .btn-primary:hover { background: #e85a24; border-color: #e85a24; }
  .btn-secondary{ background: #242430; color: #f0f0f4; border-color: rgba(255,255,255,0.10); }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.20); background: #2c2c3a; }
  .btn-ghost    { background: transparent; color: #a0a0b0; border-color: transparent; }
  .btn-ghost:hover { color: #f0f0f4; background: rgba(255,255,255,0.05); }
  .btn-danger   { background: #7f1d1d; color: #fca5a5; border-color: #f87171; }
  .btn-danger:hover { background: #991b1b; }
  .btn-outline  { background: transparent; color: #ff6b35; border-color: #ff6b35; }
  .btn-outline:hover { background: rgba(255,107,53,0.08); }
  .btn-disabled { background: #242430; color: #606070; border-color: rgba(255,255,255,0.06); cursor: not-allowed; opacity: 0.5; }
  .divider { width: 1px; height: 28px; background: var(--border-subtle); margin: 0 4px; }
</style>
</head>
<body>

<div class="section-label">Primary</div>
<div class="row">
  <button class="btn btn-primary btn-sm">Run Analysis</button>
  <button class="btn btn-primary btn-md">Run Analysis</button>
  <button class="btn btn-primary btn-lg">Run Analysis</button>
</div>

<div class="section-label">Secondary</div>
<div class="row">
  <button class="btn btn-secondary btn-sm">Export PDF</button>
  <button class="btn btn-secondary btn-md">Export PDF</button>
  <button class="btn btn-secondary btn-lg">Export PDF</button>
</div>

<div class="section-label">Ghost</div>
<div class="row">
  <button class="btn btn-ghost btn-sm">Cancel</button>
  <button class="btn btn-ghost btn-md">Cancel</button>
  <button class="btn btn-ghost btn-lg">Cancel</button>
</div>

<div class="section-label">Outline</div>
<div class="row">
  <button class="btn btn-outline btn-sm">Open Tool</button>
  <button class="btn btn-outline btn-md">Open Tool</button>
  <button class="btn btn-outline btn-lg">Open Tool</button>
</div>

<div class="section-label">Danger</div>
<div class="row">
  <button class="btn btn-danger btn-sm">Delete</button>
  <button class="btn btn-danger btn-md">Delete Project</button>
</div>

<div class="section-label">Disabled</div>
<div class="row">
  <button class="btn btn-disabled btn-sm" disabled>Run Analysis</button>
  <button class="btn btn-disabled btn-md" disabled>Run Analysis</button>
</div>

</body>
</html>
